<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>TetherDash</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100%; height: 100%;
    background: #07090c;
    color: #e8eef5;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic UI", sans-serif;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }
  body {
    display: flex;
    align-items: stretch;
    padding: 18px;
    gap: 18px;
  }
  .panel {
    flex: 1;
    background: linear-gradient(160deg, #11151c 0%, #0a0d12 100%);
    border: 1px solid #1d242e;
    border-radius: 22px;
    padding: 22px;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }
  .panel-title {
    font-size: 11px;
    letter-spacing: 0.18em;
    color: #6b7686;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .panel-sub {
    font-size: 13px;
    color: #8b95a5;
    margin-bottom: 14px;
  }

  /* ===== LEFT: BATTERY (vertical) ===== */
  .battery-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 32px;
  }
  .vbattery {
    height: 100%;
    max-height: min(72vh, 440px);
    aspect-ratio: 0.42;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ===== Battery history chart ===== */
  .battery-chart-wrap {
    flex: 0 0 auto;
    padding-top: 12px;
    margin-top: 12px;
    border-top: 1px solid #1a2230;
  }
  .chart-label {
    font-size: 10px;
    letter-spacing: 0.15em;
    color: #6b7686;
    text-transform: uppercase;
    margin-bottom: 6px;
    display: flex;
    justify-content: space-between;
  }
  .battery-chart {
    width: 100%;
    height: 70px;
    display: block;
  }
  .battery-chart .grid {
    stroke: #1a2230;
    stroke-width: 1;
    stroke-dasharray: 2 4;
  }
  .vbattery-cap {
    width: 38%;
    height: 12px;
    background: #2a3445;
    border-radius: 4px 4px 0 0;
  }
  .vbattery-shell {
    flex: 1;
    width: 100%;
    border: 3px solid #2a3445;
    border-radius: 16px;
    position: relative;
    overflow: hidden;
    background: #0a0d12;
  }
  .vbattery-fill {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 0%;
    background: linear-gradient(180deg, #3adc91 0%, #2ab87a 100%);
    transition: height 0.8s cubic-bezier(.2,.7,.2,1), background 0.5s;
    box-shadow: 0 0 24px rgba(58, 220, 145, 0.5);
  }
  .vbattery-fill::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: rgba(255, 255, 255, 0.4);
  }
  body.charging .vbattery-fill {
    animation: chargePulse 1.8s ease-in-out infinite;
  }
  @keyframes chargePulse {
    0%, 100% { box-shadow: 0 0 24px rgba(58, 220, 145, 0.5); }
    50% { box-shadow: 0 0 36px rgba(255, 211, 77, 0.7); }
  }
  .battery-meta {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 10px;
  }
  .battery-pct {
    font-size: clamp(56px, 13vh, 120px);
    font-weight: 200;
    letter-spacing: -0.04em;
    font-feature-settings: "tnum";
    line-height: 1;
  }
  .battery-pct span.unit {
    font-size: 0.4em;
    color: #8b95a5;
    margin-left: 4px;
  }
  .battery-state {
    font-size: 14px;
    color: #8b95a5;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .bolt {
    width: 16px; height: 16px;
    display: none;
    color: #ffd34d;
    filter: drop-shadow(0 0 6px #ffd34d);
  }
  body.charging .bolt {
    display: inline-block;
    animation: pulse 1.4s ease-in-out infinite;
  }
  body.charging .battery-state { color: #ffd34d; }
  @keyframes pulse {
    0%, 100% { opacity: 0.6; transform: scale(0.9); }
    50% { opacity: 1; transform: scale(1.1); }
  }

  /* ===== Network tech badge ===== */
  .net-badge {
    display: inline-block;
    font-size: 10px;
    letter-spacing: 0.08em;
    background: #1a2230;
    color: #5aaaff;
    padding: 2px 8px;
    border-radius: 10px;
    margin-left: 8px;
    vertical-align: middle;
    font-weight: 500;
  }
  .net-badge.fiveg { color: #3adc91; }
  .net-badge.fourg { color: #5aaaff; }
  .net-badge.threeg { color: #ffd34d; }
  .net-badge.twog { color: #ff5566; }

  /* ===== RIGHT: TETHERING ===== */
  .data-main {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 18px;
  }
  .data-volume {
    text-align: center;
  }
  .data-volume .num {
    font-size: clamp(54px, 12vh, 110px);
    font-weight: 200;
    letter-spacing: -0.04em;
    font-feature-settings: "tnum";
    line-height: 1;
    background: linear-gradient(180deg, #ffffff 0%, #aab5c5 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .data-volume .unit {
    font-size: 0.32em;
    color: #8b95a5;
    margin-left: 6px;
    -webkit-text-fill-color: #8b95a5;
  }
  .data-volume .label {
    font-size: 11px;
    letter-spacing: 0.18em;
    color: #6b7686;
    text-transform: uppercase;
    margin-top: 6px;
  }
  .stats-row {
    display: flex;
    gap: 12px;
  }
  .stat {
    flex: 1;
    background: #0c1117;
    border: 1px solid #1a2230;
    border-radius: 14px;
    padding: 12px 14px;
    text-align: center;
  }
  .stat .v {
    font-size: 22px;
    font-weight: 300;
    font-feature-settings: "tnum";
    line-height: 1.1;
  }
  .stat .k {
    font-size: 10px;
    letter-spacing: 0.15em;
    color: #6b7686;
    text-transform: uppercase;
    margin-top: 4px;
  }
  .speed-down { color: #3adc91; }
  .speed-up { color: #5aaaff; }

  .controls {
    display: flex;
    gap: 10px;
    margin-top: auto;
    padding-top: 14px;
  }
  button {
    flex: 1;
    background: #1a2230;
    color: #e8eef5;
    border: 1px solid #2a3445;
    border-radius: 12px;
    padding: 11px;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: background 0.15s;
    font-family: inherit;
  }
  button:active { background: #2a3445; }
  button.primary {
    background: linear-gradient(180deg, #3adc91 0%, #2ab87a 100%);
    color: #0a1a12;
    border-color: transparent;
  }
  button.primary:active { filter: brightness(0.92); }

  .dev-hint {
    position: fixed;
    bottom: 4px; left: 50%;
    transform: translateX(-50%);
    font-size: 9px;
    color: #3a4453;
    letter-spacing: 0.1em;
  }
  .remote-info {
    margin-top: 6px;
    font-size: 11px;
    color: #5aaaff;
    text-align: center;
    font-feature-settings: "tnum";
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 6px;
  }
  .remote-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #3adc91;
    box-shadow: 0 0 6px #3adc91;
    animation: pulse 1.8s ease-in-out infinite;
  }
  button#btnRemote.active,
  button#btnCloud.active {
    background: linear-gradient(180deg, #5aaaff 0%, #3a8adf 100%);
    color: #0a1226;
    border-color: transparent;
  }
</style>
</head>
<body>
  <!-- LEFT: BATTERY PANEL -->
  <div class="panel">
    <div class="panel-title">Battery</div>
    <div class="battery-wrap">
      <div class="vbattery">
        <div class="vbattery-cap"></div>
        <div class="vbattery-shell">
          <div class="vbattery-fill" id="batFill"></div>
        </div>
      </div>
      <div class="battery-meta">
        <div class="battery-pct"><span id="batPct">--</span><span class="unit">%</span></div>
        <div class="battery-state">
          <svg class="bolt" viewBox="0 0 24 24" fill="currentColor"><path d="M13 2L4 14h7l-1 8 9-12h-7l1-8z"/></svg>
          <span id="batState">読み込み中</span>
        </div>
      </div>
    </div>
    <div class="battery-chart-wrap">
      <div class="chart-label">
        <span>過去12時間</span>
        <span id="chartRange">--</span>
      </div>
      <svg class="battery-chart" id="batChart" viewBox="0 0 400 70" preserveAspectRatio="none">
        <line class="grid" x1="0" y1="17" x2="400" y2="17"/>
        <line class="grid" x1="0" y1="35" x2="400" y2="35"/>
        <line class="grid" x1="0" y1="53" x2="400" y2="53"/>
      </svg>
    </div>
  </div>

  <!-- RIGHT: TETHERING PANEL -->
  <div class="panel">
    <div class="panel-title">Tethering<span class="net-badge" id="netBadge" style="display:none">--</span></div>
    <div class="panel-sub">概算 (セルラー全体)</div>

    <div class="data-main">
      <div class="data-volume">
        <div class="num"><span id="dataVal">0.00</span><span class="unit" id="dataUnit">MB</span></div>
        <div class="label" id="sessionLabel">SESSION  00:00:00</div>
      </div>
      <div class="stats-row">
        <div class="stat">
          <div class="v speed-down">↓ <span id="speedDown">0.0</span> <span style="font-size:0.6em;color:#6b7686">MB/s</span></div>
          <div class="k">Down</div>
        </div>
        <div class="stat">
          <div class="v speed-up">↑ <span id="speedUp">0.0</span> <span style="font-size:0.6em;color:#6b7686">MB/s</span></div>
          <div class="k">Up</div>
        </div>
      </div>
    </div>
    <div class="controls">
      <button class="primary" id="btnStart">開始</button>
      <button id="btnReset">リセット</button>
      <button id="btnRemote">リモート</button>
      <button id="btnCloud">ネット共有</button>
    </div>
    <div class="remote-info" id="remoteInfo" style="display:none">
      <span class="remote-dot"></span>
      <span id="remoteUrl">--</span>
    </div>
    <div class="remote-info" id="cloudInfo" style="display:none">
      <span class="remote-dot"></span>
      <span id="cloudUrl">--</span>
    </div>
  </div>

  <div class="dev-hint">PROTOTYPE — MOCK DATA</div>

<script>
// ============================================================
//  TetherDash
//  - ネイティブ (Capacitor on iOS): 実APIを叩く
//      Battery   → @capacitor/device の Device.getBatteryInfo()
//      Bytes     → 自作プラグイン NetworkBytes.readCounters() ※Swift側で getifaddrs("pdp_ip0")
//      画面常時ON → @capacitor-community/keep-awake
//  - ブラウザ: モック(プロトタイプ動作確認用)
// ============================================================

const $ = (id) => document.getElementById(id);
const isNative = !!(window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform());

document.querySelector('.dev-hint').textContent = isNative ? '' : 'PROTOTYPE — MOCK DATA';

async function setupKeepAwake() {
  if (!isNative) return;
  try { await window.Capacitor.Plugins.KeepAwake.keepAwake(); } catch (e) { console.warn('KeepAwake unavailable', e); }
}

// ----- BATTERY -----
let mockBat = 0.73;
let mockCharging = false;
async function readBattery() {
  if (isNative && window.Capacitor.Plugins.Device) {
    try {
      const info = await window.Capacitor.Plugins.Device.getBatteryInfo();
      return { level: info.batteryLevel ?? 0, charging: !!info.isCharging };
    } catch (e) { /* fallthrough */ }
  }
  return { level: mockBat, charging: mockCharging };
}
function applyBatteryUI(level, charging) {
  const pct = Math.round(level * 100);
  $('batPct').textContent = pct;
  $('batFill').style.height = (level * 100) + '%';
  let color;
  if (level > 0.5) color = 'linear-gradient(180deg, #3adc91 0%, #2ab87a 100%)';
  else if (level > 0.2) color = 'linear-gradient(180deg, #ffd34d 0%, #e0a820 100%)';
  else color = 'linear-gradient(180deg, #ff5566 0%, #c93142 100%)';
  $('batFill').style.background = color;
  document.body.classList.toggle('charging', charging);
  $('batState').textContent = charging ? '充電中' : (pct < 20 ? '残量わずか' : '使用中');
}

// ----- BATTERY HISTORY (12h chart) -----
const BAT_HIST_KEY = 'tetherdash_battery_history';
const BAT_WINDOW_MS = 12 * 60 * 60 * 1000;       // 12h
const BAT_SAMPLE_INTERVAL_MS = 60_000;            // 1min
const SVG_NS = 'http://www.w3.org/2000/svg';
let batteryHistory = (function () {
  try {
    const a = JSON.parse(localStorage.getItem(BAT_HIST_KEY) || '[]');
    return Array.isArray(a) ? a : [];
  } catch (e) { return []; }
})();
let lastBatSample = 0;

function saveBatteryHistory() {
  try { localStorage.setItem(BAT_HIST_KEY, JSON.stringify(batteryHistory)); } catch (e) {}
}
function recordBatterySample(level, charging) {
  const now = Date.now();
  if (now - lastBatSample < BAT_SAMPLE_INTERVAL_MS) return;
  lastBatSample = now;
  batteryHistory.push({ ts: now, level, charging });
  const cutoff = now - BAT_WINDOW_MS;
  batteryHistory = batteryHistory.filter(s => s.ts >= cutoff);
  saveBatteryHistory();
  drawBatteryChart();
}
function fmtHM(ts) {
  const d = new Date(ts);
  return String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
}
function segColor(s) {
  if (s.charging) return '#ffd34d';
  if (s.level < 0.2) return '#ff5566';
  return '#3adc91';
}
function drawBatteryChart() {
  const svg = $('batChart');
  if (!svg) return;
  // Remove non-grid elements
  Array.from(svg.querySelectorAll('line:not(.grid), polyline, circle')).forEach(n => svg.removeChild(n));
  const W = 400, H = 70, PAD = 5;
  const RANGE = H - 2 * PAD;
  const yOf = (level) => PAD + (1 - level) * RANGE;
  const now = Date.now();
  const xStart = now - BAT_WINDOW_MS;
  const span = BAT_WINDOW_MS;
  // Range label
  if (batteryHistory.length > 0) {
    const first = batteryHistory[0];
    const ageMin = Math.round((now - first.ts) / 60000);
    if (ageMin < 60) $('chartRange').textContent = `直近 ${ageMin}分`;
    else $('chartRange').textContent = `${fmtHM(first.ts)} - 現在`;
  } else {
    $('chartRange').textContent = '記録なし';
  }
  if (batteryHistory.length < 2) return;
  for (let i = 1; i < batteryHistory.length; i++) {
    const a = batteryHistory[i - 1];
    const b = batteryHistory[i];
    const x1 = ((a.ts - xStart) / span) * W;
    const y1 = yOf(a.level);
    const x2 = ((b.ts - xStart) / span) * W;
    const y2 = yOf(b.level);
    const line = document.createElementNS(SVG_NS, 'line');
    line.setAttribute('x1', x1.toFixed(1));
    line.setAttribute('y1', y1.toFixed(1));
    line.setAttribute('x2', x2.toFixed(1));
    line.setAttribute('y2', y2.toFixed(1));
    line.setAttribute('stroke', segColor(b));
    line.setAttribute('stroke-width', '2');
    line.setAttribute('stroke-linecap', 'round');
    svg.appendChild(line);
  }
  // Current point marker
  const last = batteryHistory[batteryHistory.length - 1];
  const cx = ((last.ts - xStart) / span) * W;
  const cy = yOf(last.level);
  const dot = document.createElementNS(SVG_NS, 'circle');
  dot.setAttribute('cx', cx.toFixed(1));
  dot.setAttribute('cy', cy.toFixed(1));
  dot.setAttribute('r', '3');
  dot.setAttribute('fill', segColor(last));
  svg.appendChild(dot);
}

// ----- TETHERING -----
// pdp_ip0 のバイトカウンタは32bit上限 / 通信再接続でリセットされるため、
// 「前回値→今回値の差分」を累積する方式にして、減少を検知したらその時点での
// 値そのものを差分として加算する(=リセット後の再カウントを正しく拾う)。
let session = {
  active: false, startTs: 0,
  bytes: 0, bytesRx: 0, bytesTx: 0,
  dn: 0, up: 0,
};
let lastRaw = { rx: null, tx: null };
const SPEED_WINDOW_MS = 60_000;
let speedHistory = []; // [{ts, rxCum, txCum}, ...]

async function readBytesNative() {
  if (!(isNative && window.Capacitor.Plugins.NetworkBytes)) return null;
  try {
    return await window.Capacitor.Plugins.NetworkBytes.readCounters(); // { rxBytes, txBytes }
  } catch (e) { return null; }
}

// 無線技術 (4G/5G/3G/2G)。CoreTelephonyから取得、約3秒に1回ポーリング
let currentRadioLabel = '';
let lastRadioCheckTs = 0;
async function pollRadioTech() {
  if (!(isNative && window.Capacitor.Plugins.NetworkBytes && window.Capacitor.Plugins.NetworkBytes.getRadioTech)) return;
  const now = Date.now();
  if (now - lastRadioCheckTs < 3000) return;
  lastRadioCheckTs = now;
  try {
    const r = await window.Capacitor.Plugins.NetworkBytes.getRadioTech();
    currentRadioLabel = r.label || '';
    const badge = $('netBadge');
    if (currentRadioLabel) {
      badge.textContent = currentRadioLabel;
      badge.style.display = '';
      badge.className = 'net-badge ' + (
        currentRadioLabel === '5G' ? 'fiveg' :
        currentRadioLabel === '4G' ? 'fourg' :
        currentRadioLabel === '3G' ? 'threeg' : 'twog'
      );
    } else {
      badge.style.display = 'none';
    }
  } catch (e) {}
}

async function tickBytes() {
  const now = Date.now();
  const r = await readBytesNative();
  if (r) {
    if (session.active) {
      if (lastRaw.rx === null) {
        lastRaw.rx = r.rxBytes; lastRaw.tx = r.txBytes;
        speedHistory = [{ ts: now, rxCum: session.bytesRx, txCum: session.bytesTx }];
      } else {
        let dRx = r.rxBytes - lastRaw.rx;
        let dTx = r.txBytes - lastRaw.tx;
        if (dRx < 0) dRx = Math.max(0, r.rxBytes); // カウンタリセット検知
        if (dTx < 0) dTx = Math.max(0, r.txBytes);
        session.bytesRx += dRx;
        session.bytesTx += dTx;
        lastRaw.rx = r.rxBytes; lastRaw.tx = r.txBytes;

        speedHistory.push({ ts: now, rxCum: session.bytesRx, txCum: session.bytesTx });
        const cutoff = now - SPEED_WINDOW_MS;
        while (speedHistory.length > 2 && speedHistory[0].ts < cutoff) speedHistory.shift();
        if (speedHistory.length >= 2) {
          const oldest = speedHistory[0];
          const dt = (now - oldest.ts) / 1000;
          if (dt > 0) {
            session.dn = (session.bytesRx - oldest.rxCum) / 1_000_000 / dt;
            session.up = (session.bytesTx - oldest.txCum) / 1_000_000 / dt;
          }
        }
      }
      session.bytes = session.bytesRx + session.bytesTx;
    } else {
      lastRaw.rx = null; lastRaw.tx = null;
      speedHistory = [];
    }
  } else {
    if (session.active) {
      const inc = (300_000 + Math.random() * 2_200_000);
      session.bytes += inc;
      session.dn = inc * 0.85 / 1_000_000;
      session.up = inc * 0.15 / 1_000_000;
    }
  }
}

function fmtBytes(b) {
  if (b < 1_000_000) return { v: (b / 1000).toFixed(1), u: 'KB' };
  if (b < 1_000_000_000) return { v: (b / 1_000_000).toFixed(2), u: 'MB' };
  return { v: (b / 1_000_000_000).toFixed(2), u: 'GB' };
}
function fmtTime(ms) {
  const s = Math.floor(ms / 1000);
  const h = String(Math.floor(s / 3600)).padStart(2, '0');
  const m = String(Math.floor((s % 3600) / 60)).padStart(2, '0');
  const sec = String(s % 60).padStart(2, '0');
  return `${h}:${m}:${sec}`;
}
function updateDataUI() {
  const f = fmtBytes(session.bytes);
  $('dataVal').textContent = f.v;
  $('dataUnit').textContent = f.u;
  const elapsed = session.active ? Date.now() - session.startTs : 0;
  $('sessionLabel').textContent = `SESSION  ${fmtTime(elapsed)}`;
  $('speedDown').textContent = session.dn.toFixed(2);
  $('speedUp').textContent = session.up.toFixed(2);
}

$('btnStart').addEventListener('click', () => {
  session.active = !session.active;
  if (session.active) {
    session.startTs = Date.now();
    session.bytes = 0; session.bytesRx = 0; session.bytesTx = 0;
    session.dn = 0; session.up = 0;
    lastRaw.rx = null; lastRaw.tx = null;
    speedHistory = [];
    $('btnStart').textContent = '停止';
    $('btnStart').classList.remove('primary');
  } else {
    $('btnStart').textContent = '開始';
    $('btnStart').classList.add('primary');
  }
});
$('btnReset').addEventListener('click', () => {
  session = { active: false, startTs: 0,
              bytes: 0, bytesRx: 0, bytesTx: 0,
              dn: 0, up: 0 };
  lastRaw.rx = null; lastRaw.tx = null;
  speedHistory = [];
  $('btnStart').textContent = '開始';
  $('btnStart').classList.add('primary');
  updateDataUI();
});

// ----- Mock 揺らぎ (ブラウザ確認用) -----
if (!isNative) {
  setInterval(() => {
    if (mockCharging) {
      mockBat = Math.min(1, mockBat + 0.002);
      if (mockBat >= 1) mockCharging = false;
    } else {
      mockBat = Math.max(0, mockBat - 0.0005);
      if (mockBat < 0.15) mockCharging = true;
    }
  }, 800);
}

// ----- Local HTTP server (remote view from Windows etc.) -----
let serverRunning = false;
let lastStateLevel = 0, lastStateCharging = false;

function localServerAvailable() {
  return isNative && window.Capacitor.Plugins.LocalServer;
}
$('btnRemote').style.display = localServerAvailable() ? '' : 'none';

async function toggleRemote() {
  if (!localServerAvailable()) return;
  const Plugin = window.Capacitor.Plugins.LocalServer;
  if (serverRunning) {
    try { await Plugin.stop(); } catch (e) {}
    serverRunning = false;
    $('btnRemote').classList.remove('active');
    $('remoteInfo').style.display = 'none';
  } else {
    try {
      const res = await Plugin.start({ port: 8080 });
      serverRunning = !!res.running;
      if (serverRunning) {
        $('btnRemote').classList.add('active');
        $('remoteInfo').style.display = '';
        $('remoteUrl').textContent = res.preferredUrl || `http://[?]:${res.port}/`;
      }
    } catch (e) { console.warn('LocalServer.start failed', e); }
  }
}
$('btnRemote').addEventListener('click', toggleRemote);

function buildState(level, charging) {
  return {
    batteryLevel: level,
    charging: charging,
    bytes: session.bytes,
    dn: session.dn,
    up: session.up,
    sessionActive: session.active,
    sessionElapsedMs: session.active ? Date.now() - session.startTs : 0,
    batteryHistory: batteryHistory.slice(-720),
    radioLabel: currentRadioLabel,
    ts: Date.now()
  };
}

async function pushStateToServer(level, charging) {
  const state = buildState(level, charging);
  if (serverRunning && localServerAvailable()) {
    try { await window.Capacitor.Plugins.LocalServer.updateState({ state }); } catch (e) { /* ignore */ }
  }
  pushStateToCloud(state);
}

// ----- Cloud remote (internet, password protected via Cloudflare Worker) -----
const CLOUD_BASE = 'https://tetherdash.tom3281.workers.dev';
function td_uid(n) {
  const s = (window.crypto && crypto.randomUUID) ? crypto.randomUUID() : (Date.now().toString(36) + Math.random().toString(36).slice(2));
  return s.replace(/-/g, '').slice(0, n);
}
const cloudId = localStorage.getItem('td_cloud_id') || (function () { const v = td_uid(8); localStorage.setItem('td_cloud_id', v); return v; })();
const cloudKey = localStorage.getItem('td_cloud_key') || (function () { const v = td_uid(32); localStorage.setItem('td_cloud_key', v); return v; })();
let cloudEnabled = localStorage.getItem('td_cloud_on') === '1';
let lastCloudPush = 0;

function applyCloudUI() {
  $('btnCloud').classList.toggle('active', cloudEnabled);
  $('cloudInfo').style.display = cloudEnabled ? '' : 'none';
  $('cloudUrl').textContent = `${CLOUD_BASE}/d/${cloudId}`;
}
function toggleCloud() {
  cloudEnabled = !cloudEnabled;
  localStorage.setItem('td_cloud_on', cloudEnabled ? '1' : '0');
  applyCloudUI();
}
$('btnCloud').addEventListener('click', toggleCloud);
applyCloudUI();

async function pushStateToCloud(state) {
  if (!cloudEnabled) return;
  const now = Date.now();
  if (now - lastCloudPush < 3000) return; // ~3秒に1回に間引き
  lastCloudPush = now;
  try {
    await fetch(`${CLOUD_BASE}/api/push`, {
      method: 'POST',
      headers: { 'content-type': 'application/json', 'authorization': 'Bearer ' + cloudKey },
      body: JSON.stringify({ deviceId: cloudId, state })
    });
  } catch (e) { /* オフライン等は無視 */ }
}

// ----- Main loop -----
async function tick() {
  const bat = await readBattery();
  applyBatteryUI(bat.level, bat.charging);
  recordBatterySample(bat.level, bat.charging);
  lastStateLevel = bat.level; lastStateCharging = bat.charging;
  await tickBytes();
  updateDataUI();
  pollRadioTech();
  pushStateToServer(bat.level, bat.charging);
}
async function boot() {
  await setupKeepAwake();
  drawBatteryChart();
  await tick();
  setInterval(tick, 500);
}
boot();
</script>
