<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TetherDash Remote</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: #07090c;
    color: #e8eef5;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Yu Gothic UI", sans-serif;
    padding: 12px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: minmax(0, 1fr) auto;
    gap: 12px;
    height: 100vh;
  }
  @media (max-width: 800px) {
    body {
      grid-template-columns: 1fr;
      grid-template-rows: minmax(0, 1fr) minmax(0, 1fr) auto;
      padding: 10px;
      gap: 10px;
    }
  }
  .panel {
    background: linear-gradient(160deg, #11151c 0%, #0a0d12 100%);
    border: 1px solid #1d242e;
    border-radius: 16px;
    padding: clamp(12px, 2vh, 24px) clamp(14px, 2vw, 28px);
    display: flex;
    flex-direction: column;
    min-height: 0;
    overflow: hidden;
  }
  .panel-title {
    font-size: 11px;
    letter-spacing: 0.18em;
    color: #6b7686;
    text-transform: uppercase;
    margin-bottom: clamp(8px, 1.5vh, 14px);
    flex: 0 0 auto;
  }
  .panel-title .sub {
    font-size: 12px;
    color: #8b95a5;
    letter-spacing: normal;
    text-transform: none;
    margin-left: 10px;
  }
  .net-badge {
    display: inline-block;
    font-size: 10px;
    letter-spacing: 0.08em;
    background: #1a2230;
    color: #5aaaff;
    padding: 2px 8px;
    border-radius: 10px;
    margin-left: 8px;
    vertical-align: middle;
    font-weight: 500;
  }
  .net-badge.fiveg { color: #3adc91; }
  .net-badge.fourg { color: #5aaaff; }
  .net-badge.threeg { color: #ffd34d; }
  .net-badge.twog { color: #ff5566; }

  /* ===== Battery ===== */
  .battery-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: clamp(18px, 2.5vw, 36px);
    flex: 0 0 auto;
  }
  .vbattery {
    height: clamp(80px, 22vh, 240px);
    aspect-ratio: 0.42;
    display: flex;
    flex-direction: column;
    align-items: center;
    flex: 0 0 auto;
  }
  .vbattery-cap {
    width: 38%;
    height: 10px;
    background: #2a3445;
    border-radius: 3px 3px 0 0;
  }
  .vbattery-shell {
    flex: 1;
    width: 100%;
    border: 2px solid #2a3445;
    border-radius: 12px;
    position: relative;
    overflow: hidden;
    background: #0a0d12;
  }
  .vbattery-fill {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 0%;
    background: linear-gradient(180deg, #3adc91 0%, #2ab87a 100%);
    transition: height 0.6s ease;
    box-shadow: 0 0 18px rgba(58, 220, 145, 0.4);
  }
  .battery-num {
    font-size: clamp(40px, 11vh, 120px);
    font-weight: 200;
    letter-spacing: -0.04em;
    line-height: 1;
    font-feature-settings: "tnum";
  }
  .battery-num .unit {
    font-size: 0.4em;
    color: #8b95a5;
    margin-left: 4px;
  }
  .battery-state {
    font-size: clamp(12px, 1.6vh, 16px);
    color: #8b95a5;
    margin-top: 8px;
  }
  .battery-state.charging { color: #ffd34d; }

  .chart-wrap {
    margin-top: clamp(10px, 1.6vh, 18px);
    padding-top: 10px;
    border-top: 1px solid #1a2230;
    flex: 1 1 0;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .chart-label {
    font-size: 10px;
    letter-spacing: 0.15em;
    color: #6b7686;
    text-transform: uppercase;
    display: flex;
    justify-content: space-between;
    margin-bottom: 6px;
    flex: 0 0 auto;
  }
  .bat-chart {
    width: 100%;
    flex: 1 1 0;
    display: block;
    min-height: 0;
  }
  .bat-chart .grid { stroke: #1a2230; stroke-width: 1; stroke-dasharray: 2 4; }

  /* ===== Tethering ===== */
  .tethering-content {
    flex: 1 1 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: clamp(10px, 2vh, 24px);
    min-height: 0;
  }
  .data-num {
    font-size: clamp(42px, 12vh, 140px);
    font-weight: 200;
    letter-spacing: -0.04em;
    line-height: 1;
    font-feature-settings: "tnum";
    text-align: center;
    background: linear-gradient(180deg, #ffffff 0%, #aab5c5 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .data-num .unit {
    font-size: 0.3em;
    color: #8b95a5;
    margin-left: 6px;
    -webkit-text-fill-color: #8b95a5;
  }
  .session-label {
    text-align: center;
    font-size: clamp(10px, 1.4vh, 14px);
    letter-spacing: 0.18em;
    color: #6b7686;
    text-transform: uppercase;
    margin-top: -8px;
  }
  .stats-row {
    display: flex;
    gap: 12px;
  }
  .stat {
    flex: 1;
    background: #0c1117;
    border: 1px solid #1a2230;
    border-radius: 12px;
    padding: clamp(8px, 1.4vh, 16px);
    text-align: center;
  }
  .stat .v {
    font-size: clamp(16px, 2.6vh, 30px);
    font-weight: 300;
    font-feature-settings: "tnum";
    line-height: 1.1;
  }
  .stat .k {
    font-size: 10px;
    letter-spacing: 0.15em;
    color: #6b7686;
    text-transform: uppercase;
    margin-top: 4px;
  }
  .stat .v small { font-size: 0.6em; color: #6b7686; }
  .speed-down { color: #3adc91; }
  .speed-up { color: #5aaaff; }

  /* ===== Footer ===== */
  .footer {
    grid-column: 1 / -1;
    text-align: center;
    font-size: 10px;
    color: #3a4453;
    letter-spacing: 0.1em;
    padding: 2px 0;
  }
  .footer .live { color: #3adc91; }
  .footer .stale { color: #ff5566; }
</style>
</head>
<body>
  <div class="panel">
    <div class="panel-title">Battery</div>
    <div class="battery-row">
      <div class="vbattery">
        <div class="vbattery-cap"></div>
        <div class="vbattery-shell">
          <div class="vbattery-fill" id="batFill"></div>
        </div>
      </div>
      <div>
        <div class="battery-num"><span id="batPct">--</span><span class="unit">%</span></div>
        <div class="battery-state" id="batState">読み込み中</div>
      </div>
    </div>
    <div class="chart-wrap">
      <div class="chart-label">
        <span>過去12時間</span>
        <span id="chartRange">--</span>
      </div>
      <svg class="bat-chart" id="batChart" viewBox="0 0 400 70" preserveAspectRatio="none">
        <line class="grid" x1="0" y1="17" x2="400" y2="17"/>
        <line class="grid" x1="0" y1="35" x2="400" y2="35"/>
        <line class="grid" x1="0" y1="53" x2="400" y2="53"/>
      </svg>
    </div>
  </div>

  <div class="panel">
    <div class="panel-title">Tethering<span class="net-badge" id="netBadge" style="display:none">--</span> <span class="sub">概算 (セルラー全体)</span></div>
    <div class="tethering-content">
      <div>
        <div class="data-num"><span id="dataVal">0.00</span><span class="unit" id="dataUnit">MB</span></div>
        <div class="session-label" id="sessionLabel">SESSION  --:--:--</div>
      </div>
      <div class="stats-row">
        <div class="stat">
          <div class="v speed-down">↓ <span id="speedDown">0.0</span> <small>MB/s</small></div>
          <div class="k">Down (1分平均)</div>
        </div>
        <div class="stat">
          <div class="v speed-up">↑ <span id="speedUp">0.0</span> <small>MB/s</small></div>
          <div class="k">Up (1分平均)</div>
        </div>
      </div>
    </div>
  </div>

  <div class="footer">
    <span id="liveStatus" class="live">● LIVE</span>
    <span style="margin-left:16px">最終更新 <span id="lastUpdate">--</span></span>
  </div>

<script>
const SVG_NS = 'http://www.w3.org/2000/svg';
const $ = (id) => document.getElementById(id);
const BAT_WINDOW_MS = 12 * 60 * 60 * 1000;

function fmtBytes(b) {
  if (!b || b < 1_000_000) return { v: ((b||0) / 1000).toFixed(1), u: 'KB' };
  if (b < 1_000_000_000) return { v: (b / 1_000_000).toFixed(2), u: 'MB' };
  return { v: (b / 1_000_000_000).toFixed(2), u: 'GB' };
}
function fmtTime(ms) {
  const s = Math.floor((ms||0) / 1000);
  const h = String(Math.floor(s / 3600)).padStart(2, '0');
  const m = String(Math.floor((s % 3600) / 60)).padStart(2, '0');
  const sec = String(s % 60).padStart(2, '0');
  return `${h}:${m}:${sec}`;
}
function fmtHM(ts) {
  const d = new Date(ts);
  return String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
}
function segColor(s) {
  if (s.charging) return '#ffd34d';
  if (s.level < 0.2) return '#ff5566';
  return '#3adc91';
}

function drawBatteryChart(history) {
  const svg = $('batChart');
  Array.from(svg.querySelectorAll('line:not(.grid), circle')).forEach(n => svg.removeChild(n));
  const W = 400, H = 70, PAD = 5;
  const RANGE = H - 2 * PAD; // 60 — 上下5pxの余白を確保してストロークが切れないように
  const yOf = (level) => PAD + (1 - level) * RANGE;
  const now = Date.now();
  const xStart = now - BAT_WINDOW_MS;
  if (!history || history.length === 0) {
    $('chartRange').textContent = '記録なし';
    return;
  }
  const first = history[0];
  const ageMin = Math.round((now - first.ts) / 60000);
  $('chartRange').textContent = ageMin < 60 ? `直近 ${ageMin}分` : `${fmtHM(first.ts)} - 現在`;
  if (history.length < 2) return;
  for (let i = 1; i < history.length; i++) {
    const a = history[i - 1], b = history[i];
    const line = document.createElementNS(SVG_NS, 'line');
    line.setAttribute('x1', (((a.ts - xStart) / BAT_WINDOW_MS) * W).toFixed(1));
    line.setAttribute('y1', yOf(a.level).toFixed(1));
    line.setAttribute('x2', (((b.ts - xStart) / BAT_WINDOW_MS) * W).toFixed(1));
    line.setAttribute('y2', yOf(b.level).toFixed(1));
    line.setAttribute('stroke', segColor(b));
    line.setAttribute('stroke-width', '2');
    line.setAttribute('stroke-linecap', 'round');
    svg.appendChild(line);
  }
  const last = history[history.length - 1];
  const dot = document.createElementNS(SVG_NS, 'circle');
  dot.setAttribute('cx', (((last.ts - xStart) / BAT_WINDOW_MS) * W).toFixed(1));
  dot.setAttribute('cy', yOf(last.level).toFixed(1));
  dot.setAttribute('r', '3');
  dot.setAttribute('fill', segColor(last));
  svg.appendChild(dot);
}

let lastFetchTs = 0;
async function poll() {
  try {
    const r = await fetch('/state.json', { cache: 'no-store' });
    if (!r.ok) throw new Error('http ' + r.status);
    const s = await r.json();
    lastFetchTs = Date.now();

    const level = s.batteryLevel ?? 0;
    const charging = !!s.charging;
    const pct = Math.round(level * 100);
    $('batPct').textContent = pct;
    $('batFill').style.height = (level * 100) + '%';
    let g;
    if (level > 0.5) g = 'linear-gradient(180deg,#3adc91 0%,#2ab87a 100%)';
    else if (level > 0.2) g = 'linear-gradient(180deg,#ffd34d 0%,#e0a820 100%)';
    else g = 'linear-gradient(180deg,#ff5566 0%,#c93142 100%)';
    $('batFill').style.background = g;
    $('batState').textContent = charging ? '充電中' : (pct < 20 ? '残量わずか' : '使用中');
    $('batState').classList.toggle('charging', charging);

    const f = fmtBytes(s.bytes || 0);
    $('dataVal').textContent = f.v;
    $('dataUnit').textContent = f.u;
    $('sessionLabel').textContent = `SESSION  ${fmtTime(s.sessionElapsedMs || 0)}`;
    $('speedDown').textContent = (s.dn || 0).toFixed(2);
    $('speedUp').textContent = (s.up || 0).toFixed(2);

    drawBatteryChart(s.batteryHistory || []);

    const radio = (s.radioLabel || '').toString();
    const badge = $('netBadge');
    if (radio) {
      badge.textContent = radio;
      badge.style.display = '';
      badge.className = 'net-badge ' + (
        radio === '5G' ? 'fiveg' :
        radio === '4G' ? 'fourg' :
        radio === '3G' ? 'threeg' : 'twog'
      );
    } else {
      badge.style.display = 'none';
    }

    $('liveStatus').textContent = '● LIVE';
    $('liveStatus').className = 'live';
    $('lastUpdate').textContent = new Date(lastFetchTs).toLocaleTimeString('ja-JP');
  } catch (e) {
    $('liveStatus').textContent = '● 切断';
    $('liveStatus').className = 'stale';
  }
}
setInterval(poll, 1000);
poll();
</script>
</body>
</html>
